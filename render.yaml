# Render deployment config (https://render.com/docs/blueprint-spec)
services:
  - type: web
    name: finance-pipeline-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: finance-db
          property: connectionString

databases:
  - name: finance-db
    databaseName: finance_db
    user: finance_user
    plan: free
